<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Single-Serve Grinder Maintenance Checklist 2026</title>
  <desc id="desc">Editorial checklist graphic with daily, weekly, and monthly maintenance tasks for single-serve coffee makers with built-in grinders.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="80" y="96" fill="#f8fafc" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="700">Single-Serve Grinder Maintenance Checklist</text>
  <text x="80" y="136" fill="#cbd5e1" font-size="26" font-family="Arial, Helvetica, sans-serif">Keep flavor stable, reduce clogging, and cut weekday cleanup friction</text>

  <rect x="70" y="180" width="340" height="420" rx="20" fill="url(#panel)"/>
  <rect x="430" y="180" width="340" height="420" rx="20" fill="url(#panel)"/>
  <rect x="790" y="180" width="340" height="420" rx="20" fill="url(#panel)"/>

  <text x="100" y="235" fill="#0f172a" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Daily</text>
  <text x="460" y="235" fill="#0f172a" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Weekly</text>
  <text x="820" y="235" fill="#0f172a" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Monthly</text>

  <text x="100" y="285" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Rinse brew basket + mug stand</text>
  <text x="100" y="325" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Wipe grinder lid and chute lip</text>
  <text x="100" y="365" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Empty drip tray if splashing</text>
  <text x="100" y="405" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Leave lid open to air dry</text>

  <text x="460" y="285" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Brush grinder path and hopper</text>
  <text x="460" y="325" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Run water-only flush cycle</text>
  <text x="460" y="365" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Check for grounds buildup</text>
  <text x="460" y="405" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Clean pod adapter if used</text>

  <text x="820" y="285" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Descale (2–4 week cadence)</text>
  <text x="820" y="325" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Deep-clean removable parts</text>
  <text x="820" y="365" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Check water tank for film</text>
  <text x="820" y="405" fill="#1e293b" font-size="24" font-family="Arial, Helvetica, sans-serif">• Reset brew strength baseline</text>

  <text x="80" y="640" fill="#94a3b8" font-size="22" font-family="Arial, Helvetica, sans-serif">Coffee Gear Lab • March 2026</text>
</svg>
