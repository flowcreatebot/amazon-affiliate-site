<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Workflow map for choosing a coffee scale based on brew style and footprint</title>
  <desc id="desc">Decision workflow with three paths: espresso-first, pour-over-first, and hybrid, each leading through response speed and footprint checks to a final shortlist.</desc>
  <rect width="1200" height="675" fill="#FAF8F5"/>
  <rect x="40" y="40" width="1120" height="595" rx="20" fill="#F5EDE4" stroke="#B89B8A" stroke-width="2"/>

  <text x="80" y="105" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#2C1810">Coffee Scale Selection Workflow</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#5C3D2E">Start with brew style, then narrow by response speed and footprint fit.</text>

  <rect x="80" y="185" width="300" height="110" rx="12" fill="#EFDFCE" stroke="#7A5B4A" stroke-width="2"/>
  <text x="105" y="230" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#2C1810">Espresso-first</text>
  <text x="105" y="262" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="400" fill="#5C3D2E">Prioritize fast readout + compact tray fit</text>

  <rect x="450" y="185" width="300" height="110" rx="12" fill="#EFDFCE" stroke="#7A5B4A" stroke-width="2"/>
  <text x="475" y="230" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#2C1810">Pour-over-first</text>
  <text x="475" y="262" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="400" fill="#5C3D2E">Prioritize visibility + stable timer flow</text>

  <rect x="820" y="185" width="300" height="110" rx="12" fill="#EFDFCE" stroke="#7A5B4A" stroke-width="2"/>
  <text x="845" y="230" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#2C1810">Hybrid use</text>
  <text x="845" y="262" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="400" fill="#5C3D2E">Balance speed, readability, and footprint</text>

  <line x1="230" y1="295" x2="230" y2="345" stroke="#059669" stroke-width="5"/>
  <line x1="600" y1="295" x2="600" y2="345" stroke="#059669" stroke-width="5"/>
  <line x1="970" y1="295" x2="970" y2="345" stroke="#059669" stroke-width="5"/>

  <rect x="120" y="345" width="220" height="90" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
  <text x="140" y="382" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#2C1810">Response speed</text>
  <text x="140" y="410" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#5C3D2E">Low-lag stop control</text>

  <rect x="490" y="345" width="220" height="90" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
  <text x="510" y="382" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#2C1810">Timer clarity</text>
  <text x="510" y="410" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#5C3D2E">Readable during pours</text>

  <rect x="860" y="345" width="220" height="90" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
  <text x="880" y="382" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#2C1810">Footprint fit</text>
  <text x="880" y="410" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#5C3D2E">Tray and cup clearance</text>

  <line x1="230" y1="435" x2="600" y2="500" stroke="#7A5B4A" stroke-width="3"/>
  <line x1="600" y1="435" x2="600" y2="500" stroke="#7A5B4A" stroke-width="3"/>
  <line x1="970" y1="435" x2="600" y2="500" stroke="#7A5B4A" stroke-width="3"/>

  <rect x="390" y="500" width="420" height="105" rx="14" fill="#ECFDF5" stroke="#059669" stroke-width="4"/>
  <text x="420" y="545" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#2C1810">Build your shortlist</text>
  <text x="420" y="578" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="#5C3D2E">Pick 2–3 scales that match brew style, speed, and fit</text>
</svg>
