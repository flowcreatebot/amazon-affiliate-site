<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Espresso grinder dial-in workflow illustration</title>
  <desc id="desc">Warm editorial illustration of a burr grinder, espresso cup, and four-step dial-in checkpoints from baseline to fine adjustment and logging.</desc>
  <rect x="0" y="0" width="1200" height="675" fill="#FAF8F5"/>
  <rect x="56" y="56" width="1088" height="563" rx="12" fill="#F5EDE4"/>

  <text x="88" y="126" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800">Burr Grinder Espresso Dial-In Workflow</text>
  <text x="88" y="164" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="400">Baseline recipe → test shot → small adjustment → log and repeat</text>

  <rect x="84" y="208" width="252" height="360" rx="12" fill="#EFDFCE"/>
  <rect x="130" y="252" width="160" height="220" rx="12" fill="#FAF8F5" stroke="#5C3D2E" stroke-width="4"/>
  <rect x="158" y="278" width="104" height="72" rx="8" fill="#F5EDE4"/>
  <circle cx="210" cy="388" r="44" fill="#F5EDE4" stroke="#5C3D2E" stroke-width="4"/>
  <circle cx="210" cy="388" r="16" fill="#059669"/>
  <text x="113" y="517" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">Grinder</text>

  <g>
    <rect x="382" y="228" width="176" height="116" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
    <text x="402" y="267" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">1. Baseline</text>
    <text x="402" y="298" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">18g in / 36g out</text>

    <rect x="592" y="228" width="176" height="116" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
    <text x="612" y="267" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">2. Test Shot</text>
    <text x="612" y="298" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Time + taste check</text>

    <rect x="802" y="228" width="176" height="116" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
    <text x="822" y="267" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">3. Adjust</text>
    <text x="822" y="298" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">One small move</text>

    <rect x="1012" y="228" width="132" height="116" rx="12" fill="#FAF8F5" stroke="#059669" stroke-width="3"/>
    <text x="1028" y="267" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">4. Log</text>
    <text x="1028" y="298" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Save result</text>
  </g>

  <path d="M560 286 H582" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
  <path d="M770 286 H792" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
  <path d="M980 286 H1002" stroke="#059669" stroke-width="4" stroke-linecap="round"/>

  <ellipse cx="505" cy="468" rx="92" ry="38" fill="#FAF8F5" stroke="#5C3D2E" stroke-width="4"/>
  <rect x="458" y="396" width="94" height="74" rx="12" fill="#F5EDE4" stroke="#5C3D2E" stroke-width="4"/>
  <text x="438" y="532" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">Espresso cup</text>

  <rect x="634" y="396" width="430" height="172" rx="12" fill="#FAF8F5" stroke="#EFDFCE" stroke-width="3"/>
  <text x="662" y="438" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800">Dial-in checkpoints</text>
  <text x="662" y="474" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Sour + fast → go finer</text>
  <text x="662" y="506" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Bitter + slow → go coarser</text>
  <text x="662" y="538" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Keep dose and yield fixed while tuning</text>
</svg>
