<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Diagram of coffee scale buying priorities by budget and brew method</title>
  <desc id="desc">Three-lane guide for budget, mid-range, and premium buyers with espresso and pour-over checkpoints and final recommendation focus.</desc>
  <rect width="1200" height="675" fill="#F5EDE4"/>
  <rect x="36" y="36" width="1128" height="603" rx="20" fill="#FAF8F5" stroke="#B89B8A" stroke-width="2"/>

  <text x="80" y="102" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="#2C1810">Coffee Scale Buying Priorities (2026)</text>
  <text x="80" y="140" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400" fill="#5C3D2E">Choose your budget lane, then confirm brew-method fit before buying.</text>

  <rect x="80" y="182" width="320" height="390" rx="14" fill="#EFDFCE" stroke="#7A5B4A" stroke-width="2"/>
  <rect x="440" y="182" width="320" height="390" rx="14" fill="#EFDFCE" stroke="#7A5B4A" stroke-width="2"/>
  <rect x="800" y="182" width="320" height="390" rx="14" fill="#EFDFCE" stroke="#7A5B4A" stroke-width="2"/>

  <text x="110" y="228" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#2C1810">Budget</text>
  <text x="470" y="228" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#2C1810">Mid-range</text>
  <text x="830" y="228" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#2C1810">Premium</text>

  <circle cx="120" cy="278" r="8" fill="#059669"/>
  <text x="142" y="285" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">0.1 g precision baseline</text>
  <circle cx="120" cy="320" r="8" fill="#059669"/>
  <text x="142" y="327" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Basic timer + tare speed</text>
  <circle cx="120" cy="362" r="8" fill="#059669"/>
  <text x="142" y="369" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Starter espresso fit check</text>
  <circle cx="120" cy="404" r="8" fill="#059669"/>
  <text x="142" y="411" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Simple pour-over readability</text>
  <text x="110" y="462" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#5C3D2E">Best when upgrading from scoop brewing</text>

  <circle cx="480" cy="278" r="8" fill="#059669"/>
  <text x="502" y="285" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Faster espresso response</text>
  <circle cx="480" cy="320" r="8" fill="#059669"/>
  <text x="502" y="327" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Compact tray footprint</text>
  <circle cx="480" cy="362" r="8" fill="#059669"/>
  <text x="502" y="369" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Stable timer for manual brews</text>
  <circle cx="480" cy="404" r="8" fill="#059669"/>
  <text x="502" y="411" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Balanced daily usability</text>
  <text x="470" y="462" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#5C3D2E">Best for hybrid espresso + pour-over homes</text>

  <circle cx="840" cy="278" r="8" fill="#059669"/>
  <text x="862" y="285" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Advanced app and recipe logs</text>
  <circle cx="840" cy="320" r="8" fill="#059669"/>
  <text x="862" y="327" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">High-end build consistency</text>
  <circle cx="840" cy="362" r="8" fill="#059669"/>
  <text x="862" y="369" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Profile-specific workflows</text>
  <circle cx="840" cy="404" r="8" fill="#059669"/>
  <text x="862" y="411" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#2C1810">Long-term data tracking</text>
  <text x="830" y="462" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#5C3D2E">Best for process-heavy brew enthusiasts</text>

  <line x1="240" y1="530" x2="600" y2="602" stroke="#7A5B4A" stroke-width="3"/>
  <line x1="600" y1="530" x2="600" y2="602" stroke="#7A5B4A" stroke-width="3"/>
  <line x1="960" y1="530" x2="600" y2="602" stroke="#7A5B4A" stroke-width="3"/>

  <rect x="370" y="588" width="460" height="36" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="394" y="612" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#2C1810">Final check: buy the scale you will actually use every day</text>
</svg>
