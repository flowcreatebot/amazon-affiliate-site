<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Espresso grinder selection guide visual</title>
  <desc id="desc">Warm-toned editorial diagram showing espresso grinder priorities across precision, retention control, and workflow fit.</desc>

  <rect x="0" y="0" width="1200" height="675" rx="24" fill="#FAF8F5"/>
  <rect x="56" y="56" width="1088" height="563" rx="20" fill="#F5EDE4"/>

  <text x="92" y="128" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800">Best Burr Grinder for Espresso (2026)</text>
  <text x="92" y="168" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400">Choose for repeatable control, cleaner workflow, and low-retention performance.</text>

  <rect x="92" y="208" width="640" height="118" rx="12" fill="#EFDFCE"/>
  <circle cx="132" cy="267" r="18" fill="#059669"/>
  <text x="170" y="255" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600">Dial-in Precision</text>
  <text x="170" y="287" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Small grind changes should produce predictable shot-time shifts.</text>

  <rect x="92" y="344" width="640" height="118" rx="12" fill="#EFDFCE"/>
  <circle cx="132" cy="403" r="18" fill="#059669"/>
  <text x="170" y="391" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600">Retention &amp; Static</text>
  <text x="170" y="423" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Lower exchange and less mess means faster, steadier mornings.</text>

  <rect x="92" y="480" width="640" height="118" rx="12" fill="#EFDFCE"/>
  <circle cx="132" cy="539" r="18" fill="#059669"/>
  <text x="170" y="527" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600">Workflow Fit</text>
  <text x="170" y="559" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Match speed, noise, and cleanup effort to your daily coffee routine.</text>

  <rect x="760" y="208" width="348" height="390" rx="12" fill="#EFDFCE" stroke="#059669" stroke-width="3"/>
  <text x="790" y="254" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600">Evaluation Focus</text>
  <text x="790" y="296" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Adjustment repeatability</text>
  <text x="790" y="336" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Dose-to-dose consistency</text>
  <text x="790" y="376" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Retention behavior</text>
  <text x="790" y="416" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Static and cleanup load</text>
  <text x="790" y="456" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Kitchen workflow friction</text>
  <text x="790" y="496" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400">• Value for intended use</text>

  <text x="92" y="646" fill="#7A5B4A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="400">Coffee Gear Lab editorial image • Updated March 2026</text>
</svg>
