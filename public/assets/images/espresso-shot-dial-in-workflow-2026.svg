<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Espresso shot dial-in workflow chart</title>
  <desc id="desc">A step-by-step espresso workflow covering dose, yield ratio, shot time, taste diagnosis, and next adjustment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <style>
      .title{font:700 44px 'Inter',Arial,sans-serif;fill:#f9fafb}
      .sub{font:400 24px 'Inter',Arial,sans-serif;fill:#d1d5db}
      .head{font:700 20px 'Inter',Arial,sans-serif;fill:#111827}
      .txt{font:500 17px 'Inter',Arial,sans-serif;fill:#1f2937}
      .small{font:500 15px 'Inter',Arial,sans-serif;fill:#374151}
      .pill{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}
      .box{fill:#f9fafb;stroke:#d1d5db;stroke-width:2}
      .arrow{stroke:#f59e0b;stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" />
    </marker>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" class="title">Espresso Dial-In Workflow (Home Setup)</text>
  <text x="70" y="122" class="sub">Keep dose fixed. Change one variable at a time. Log every shot.</text>

  <rect x="70" y="165" rx="16" ry="16" width="245" height="130" class="box"/>
  <text x="92" y="201" class="head">1) Set baseline</text>
  <text x="92" y="230" class="txt">Dose: 18g in</text>
  <text x="92" y="255" class="txt">Yield: 36g out</text>
  <text x="92" y="278" class="small">Target 1:2 ratio</text>

  <rect x="350" y="165" rx="16" ry="16" width="245" height="130" class="box"/>
  <text x="372" y="201" class="head">2) Pull shot</text>
  <text x="372" y="230" class="txt">Start timer at brew</text>
  <text x="372" y="255" class="txt">Stop at target yield</text>
  <text x="372" y="278" class="small">Goal: 25-32 seconds</text>

  <rect x="630" y="165" rx="16" ry="16" width="245" height="130" class="box"/>
  <text x="652" y="201" class="head">3) Taste + diagnose</text>
  <text x="652" y="230" class="txt">Sour/thin = under</text>
  <text x="652" y="255" class="txt">Bitter/dry = over</text>
  <text x="652" y="278" class="small">Ignore crema color myths</text>

  <rect x="910" y="165" rx="16" ry="16" width="220" height="130" class="box"/>
  <text x="932" y="201" class="head">4) Adjust once</text>
  <text x="932" y="230" class="txt">Sour: grind finer</text>
  <text x="932" y="255" class="txt">Bitter: grind coarser</text>
  <text x="932" y="278" class="small">Repeat 1-3 shots</text>

  <path d="M316 230 L344 230" class="arrow"/>
  <path d="M596 230 L624 230" class="arrow"/>
  <path d="M876 230 L904 230" class="arrow"/>

  <rect x="70" y="355" rx="16" ry="16" width="510" height="238" class="box"/>
  <text x="92" y="391" class="head">Taste map (fast fixes)</text>
  <text x="92" y="422" class="txt">• Sour + fast shot (&lt;22s): grind finer</text>
  <text x="92" y="452" class="txt">• Sour + slow shot: increase dose prep quality</text>
  <text x="92" y="482" class="txt">• Bitter + slow shot (&gt;35s): grind coarser</text>
  <text x="92" y="512" class="txt">• Bitter + fast shot: lower water temp slightly</text>
  <text x="92" y="544" class="small">Only change one variable each round.</text>
  <text x="92" y="569" class="small">Re-check ratio before touching dose.</text>

  <rect x="615" y="355" rx="16" ry="16" width="515" height="238" class="box"/>
  <text x="637" y="391" class="head">Workflow checkpoints</text>
  <rect x="637" y="414" rx="8" ry="8" width="470" height="38" class="pill"/>
  <text x="654" y="439" class="txt">Use a scale: dose and yield by weight, not volume</text>
  <rect x="637" y="464" rx="8" ry="8" width="470" height="38" class="pill"/>
  <text x="654" y="489" class="txt">Purge + wipe basket each shot to stabilize flavor</text>
  <rect x="637" y="514" rx="8" ry="8" width="470" height="38" class="pill"/>
  <text x="654" y="539" class="txt">Clean grinder chute weekly to reduce stale fines</text>

  <text x="70" y="638" class="small">Coffee Gear Lab editorial asset · March 2026</text>
</svg>
