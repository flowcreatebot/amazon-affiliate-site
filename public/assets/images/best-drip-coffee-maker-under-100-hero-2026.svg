    <path d="M214 138 L246 138 L234 238 L206 238 Z" fill="#F5EDE4" stroke="#7A5B4A"/>
    <text x="150" y="278" text-anchor="middle" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Best for weekday routines</text>
    <text x="150" y="300" text-anchor="middle" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400">Timers + consistent daily workflow</text>
