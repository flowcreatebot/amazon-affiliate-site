<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AeroPress vs French Press comparison chart 2026</title>
  <desc id="desc">Editorial style chart comparing AeroPress and French Press on cup profile, cleanup, speed, portability, and batch size.</desc>
  <rect width="1200" height="675" fill="#0F172A"/>
  <rect x="40" y="40" width="1120" height="595" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>

  <text x="600" y="102" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">AeroPress vs French Press</text>
  <text x="600" y="138" text-anchor="middle" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">2026 Fast Buyer Comparison</text>

  <rect x="90" y="180" width="490" height="380" rx="18" fill="#1E293B"/>
  <rect x="620" y="180" width="490" height="380" rx="18" fill="#1E293B"/>

  <text x="335" y="226" text-anchor="middle" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">AeroPress</text>
  <text x="865" y="226" text-anchor="middle" fill="#FCA5A5" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">French Press</text>

  <text x="130" y="280" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Cleaner cup clarity</text>
  <text x="130" y="325" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Very fast cleanup</text>
  <text x="130" y="370" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Great for travel</text>
  <text x="130" y="415" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Best for 1-cup routines</text>
  <text x="130" y="460" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• ~2 min brew workflow</text>

  <text x="660" y="280" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Fuller, heavier body</text>
  <text x="660" y="325" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• More grounds cleanup</text>
  <text x="660" y="370" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Better for home counter use</text>
  <text x="660" y="415" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• Best for 2–3 cup batches</text>
  <text x="660" y="460" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="24">• ~4 min steep workflow</text>

  <rect x="170" y="512" width="860" height="70" rx="12" fill="#0B1220" stroke="#334155"/>
  <text x="600" y="556" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Choose by daily friction: speed + cleanup vs body + batch size</text>
</svg>
