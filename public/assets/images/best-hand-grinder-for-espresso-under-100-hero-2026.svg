<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Manual espresso grinder budget comparison concept</title>
  <desc id="desc">Editorial illustration showing three budget tiers, dial-in control markers, and effort indicators for hand grinders under one hundred dollars.</desc>
  <rect x="0" y="0" width="1200" height="675" fill="#FAF8F5"/>

  <rect x="56" y="72" width="1088" height="531" rx="12" fill="#F5EDE4"/>
  <text x="96" y="130" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">Manual Espresso Grinders Under $100</text>
  <text x="96" y="166" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400">Compare control, effort, and consistency before you buy</text>

  <rect x="96" y="208" width="308" height="310" rx="12" fill="#EFDFCE" stroke="#5C3D2E" stroke-width="2"/>
  <rect x="446" y="208" width="308" height="310" rx="12" fill="#EFDFCE" stroke="#5C3D2E" stroke-width="2"/>
  <rect x="796" y="208" width="308" height="310" rx="12" fill="#EFDFCE" stroke="#5C3D2E" stroke-width="2"/>

  <text x="124" y="252" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">Budget</text>
  <text x="474" y="252" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">Balanced</text>
  <text x="824" y="252" fill="#2C1810" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">Control-First</text>

  <rect x="124" y="276" width="160" height="10" rx="5" fill="#059669"/>
  <rect x="474" y="276" width="190" height="10" rx="5" fill="#059669"/>
  <rect x="824" y="276" width="230" height="10" rx="5" fill="#059669"/>

  <g fill="none" stroke="#5C3D2E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="164" y="310" width="64" height="142" rx="24"/>
    <line x1="196" y1="310" x2="196" y2="282"/>
    <circle cx="196" cy="272" r="10"/>

    <rect x="514" y="310" width="64" height="142" rx="24"/>
    <line x1="546" y1="310" x2="546" y2="282"/>
    <circle cx="546" cy="272" r="10"/>

    <rect x="864" y="310" width="64" height="142" rx="24"/>
    <line x1="896" y1="310" x2="896" y2="282"/>
    <circle cx="896" cy="272" r="10"/>
  </g>

  <text x="124" y="482" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">Dial-in precision</text>
  <text x="124" y="508" fill="#7A5B4A" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Moderate</text>

  <text x="474" y="482" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">Dial-in precision</text>
  <text x="474" y="508" fill="#7A5B4A" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Strong</text>

  <text x="824" y="482" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">Dial-in precision</text>
  <text x="824" y="508" fill="#7A5B4A" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Fine control</text>

  <text x="96" y="568" fill="#5C3D2E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Espresso workflow focus: click consistency, grind effort, and shot-timing repeatability.</text>
