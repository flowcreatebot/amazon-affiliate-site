<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Single-Serve Bean-to-Cup Workflow Timeline</title>
  <desc id="desc">A visual timeline showing warm-up, grind and brew, refill cadence, and cleanup cadence for single-serve coffee makers with grinders.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <text x="70" y="92" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Single-Serve Bean-to-Cup Workflow (Realistic)</text>
  <text x="70" y="128" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24">Use this to compare weekday friction, not just spec sheets.</text>

  <line x1="90" y1="330" x2="1110" y2="330" stroke="#475569" stroke-width="6" stroke-linecap="round"/>

  <g>
    <circle cx="180" cy="330" r="24" fill="#22c55e"/>
    <rect x="90" y="380" width="180" height="160" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="110" y="420" fill="#f8fafc" font-family="Arial" font-size="24" font-weight="700">Warm-up</text>
    <text x="110" y="452" fill="#cbd5e1" font-family="Arial" font-size="20">30-75 sec</text>
    <text x="110" y="482" fill="#94a3b8" font-family="Arial" font-size="18">Fastest on compact</text>
    <text x="110" y="506" fill="#94a3b8" font-family="Arial" font-size="18">single-cup models.</text>
  </g>

  <g>
    <circle cx="430" cy="330" r="24" fill="#38bdf8"/>
    <rect x="340" y="380" width="180" height="160" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="360" y="420" fill="#f8fafc" font-family="Arial" font-size="24" font-weight="700">Grind + Brew</text>
    <text x="360" y="452" fill="#cbd5e1" font-family="Arial" font-size="20">2.5-4.5 min</text>
    <text x="360" y="482" fill="#94a3b8" font-family="Arial" font-size="18">Burr machines often</text>
    <text x="360" y="506" fill="#94a3b8" font-family="Arial" font-size="18">take slightly longer.</text>
  </g>

  <g>
    <circle cx="680" cy="330" r="24" fill="#f59e0b"/>
    <rect x="590" y="380" width="180" height="160" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="610" y="420" fill="#f8fafc" font-family="Arial" font-size="24" font-weight="700">Refill Tank</text>
    <text x="610" y="452" fill="#cbd5e1" font-family="Arial" font-size="20">Every 2-8 cups</text>
    <text x="610" y="482" fill="#94a3b8" font-family="Arial" font-size="18">Larger tanks reduce</text>
    <text x="610" y="506" fill="#94a3b8" font-family="Arial" font-size="18">weekday interruptions.</text>
  </g>

  <g>
    <circle cx="930" cy="330" r="24" fill="#a78bfa"/>
    <rect x="840" y="380" width="180" height="160" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="860" y="420" fill="#f8fafc" font-family="Arial" font-size="24" font-weight="700">Cleanup</text>
    <text x="860" y="452" fill="#cbd5e1" font-family="Arial" font-size="20">1-3 min daily</text>
    <text x="860" y="482" fill="#94a3b8" font-family="Arial" font-size="18">Brush chute every</text>
    <text x="860" y="506" fill="#94a3b8" font-family="Arial" font-size="18">2-3 brews.</text>
  </g>

  <rect x="70" y="170" width="1060" height="110" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="95" y="214" fill="#e2e8f0" font-family="Arial" font-size="30" font-weight="700">Buyer-fit shortcut</text>
  <text x="95" y="252" fill="#cbd5e1" font-family="Arial" font-size="24">Speed-first: blade systems. Flavor-first: burr systems. Shared home: beans + K-Cup compatibility.</text>
</svg>
