<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coffee Gear Lab — One-line Logo Options</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 24px; background:#FAF8F5; color:#2C1810; }
    .grid { display:grid; gap:18px; }
    .card { background:#fff; border:1px solid #EFDFCE; border-radius:12px; padding:16px; }
    img { width:min(100%, 900px); height:auto; display:block; }
  </style>
</head>
<body>
  <h1>One-line logo options (manual lockup)</h1>
  <div class="grid">
    <div class="card"><h3>Option 1</h3><img src="./logo-option-1.svg" alt="Option 1 logo"/></div>
    <div class="card"><h3>Option 2</h3><img src="./logo-option-2.svg" alt="Option 2 logo"/></div>
    <div class="card"><h3>Option 3</h3><img src="./logo-option-3.svg" alt="Option 3 logo"/></div>
  </div>
</body>
</html>
