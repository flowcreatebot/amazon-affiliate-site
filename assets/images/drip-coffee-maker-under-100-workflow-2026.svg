<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Budget Drip Coffee Maker Workflow 2026</title>
  <desc id="desc">A timeline showing realistic brew time, refill cadence, and cleanup cadence for drip coffee makers under 100 dollars.</desc>
  <rect width="1200" height="675" fill="#0f172a" />
  <text x="80" y="110" fill="#f8fafc" font-size="50" font-family="Arial, Helvetica, sans-serif" font-weight="700">Under-$100 Drip Workflow Reality</text>
  <text x="80" y="152" fill="#cbd5e1" font-size="28" font-family="Arial, Helvetica, sans-serif">What daily ownership actually feels like</text>

  <line x1="100" y1="345" x2="1100" y2="345" stroke="#334155" stroke-width="10" stroke-linecap="round" />

  <g font-family="Arial, Helvetica, sans-serif">
    <circle cx="220" cy="345" r="46" fill="#0ea5e9" />
    <text x="183" y="354" fill="#082f49" font-size="24" font-weight="700">Brew</text>
    <text x="130" y="430" fill="#e2e8f0" font-size="25" font-weight="600">Full pot: ~10-12 min</text>

    <circle cx="600" cy="345" r="46" fill="#22c55e" />
    <text x="556" y="354" fill="#052e16" font-size="24" font-weight="700">Refill</text>
    <text x="485" y="430" fill="#e2e8f0" font-size="25" font-weight="600">1-3 drinkers: daily top-up</text>

    <circle cx="980" cy="345" r="46" fill="#f59e0b" />
    <text x="930" y="354" fill="#451a03" font-size="24" font-weight="700">Clean</text>
    <text x="838" y="430" fill="#e2e8f0" font-size="25" font-weight="600">Daily rinse + 4-6 week descale</text>
  </g>

  <rect x="80" y="500" width="1040" height="110" rx="16" fill="#111827" stroke="#334155" />
  <text x="120" y="548" fill="#f8fafc" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Best results: pair paper filters + routine descaling to keep taste stable and machine lifespan longer.</text>
  <text x="80" y="645" fill="#94a3b8" font-size="22" font-family="Arial, Helvetica, sans-serif">Coffee Gear Lab editorial workflow visual • March 2026</text>
</svg>
