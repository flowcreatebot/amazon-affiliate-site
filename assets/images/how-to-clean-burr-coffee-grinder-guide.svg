<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">How to Clean a Burr Coffee Grinder</title>
  <desc id="desc">Editorial visual showing weekly and monthly cleaning workflow for burr coffee grinders.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="72" y="108" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">How to Clean a Burr Coffee Grinder</text>
  <text x="72" y="148" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="28">Fewer stale oils • Lower retention • More consistent flavor</text>

  <rect x="72" y="190" width="340" height="390" rx="20" fill="url(#card)" stroke="#334155"/>
  <text x="102" y="242" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">After each brew day</text>
  <text x="102" y="286" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Brush chute + dosing cup</text>
  <text x="102" y="326" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Wipe oils from hopper</text>
  <text x="102" y="366" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Purge 0.2–0.5g after</text>
  <text x="102" y="401" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">  major setting changes</text>

  <rect x="430" y="190" width="340" height="390" rx="20" fill="url(#card)" stroke="#334155"/>
  <text x="460" y="242" fill="#86efac" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Weekly routine</text>
  <text x="460" y="286" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Empty old beans fully</text>
  <text x="460" y="326" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Dry brush upper burr</text>
  <text x="460" y="366" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Clean anti-static chute</text>
  <text x="460" y="406" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Re-zero and test shot</text>

  <rect x="788" y="190" width="340" height="390" rx="20" fill="url(#card)" stroke="#334155"/>
  <text x="818" y="242" fill="#fca5a5" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Every 4–6 weeks</text>
  <text x="818" y="286" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Remove burr set safely</text>
  <text x="818" y="326" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Deep-clean grounds path</text>
  <text x="818" y="366" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Inspect seals + screws</text>
  <text x="818" y="406" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">• Recalibrate espresso mark</text>

  <text x="72" y="628" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22">Coffee Gear Lab • Grinder Maintenance Guide (2026)</text>
</svg>
