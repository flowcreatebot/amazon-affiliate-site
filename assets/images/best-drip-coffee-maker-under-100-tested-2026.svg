  <rect width="1200" height="675" fill="url(#bg)" />
  <rect x="70" y="68" width="1060" height="539" rx="24" fill="#0b1220" stroke="#334155" stroke-width="2" />
  <text x="110" y="145" fill="#f8fafc" font-size="54" font-family="Arial, Helvetica, sans-serif" font-weight="700">Best Drip Coffee Maker Under $100</text>
  <text x="110" y="193" fill="#cbd5e1" font-size="30" font-family="Arial, Helvetica, sans-serif">2026 Budget Picks Tested</text>

