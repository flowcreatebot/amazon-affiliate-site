<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Best Coffee Grinder for Pour Over Tested Picks 2026</title>
  <desc id="desc">Editorial illustration showing seven pour-over grinder picks ranked by clarity, fines risk, and workflow effort.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f7ff"/>
      <stop offset="100%" stop-color="#eefcf5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="56" y="52" width="1088" height="571" rx="24" fill="url(#card)" stroke="#dce4ee"/>

  <text x="92" y="118" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700" fill="#101828">
    Best Coffee Grinder for Pour Over
