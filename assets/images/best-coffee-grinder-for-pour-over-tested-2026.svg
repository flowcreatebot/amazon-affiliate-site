    <rect x="24" y="226" width="382" height="48" rx="10" fill="#ecfdf3" stroke="#b7ebcd"/>
    <text x="41" y="257" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#166534">Prices checked: March 2026</text>
