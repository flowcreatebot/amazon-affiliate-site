    <text x="92" y="220">Ranking factors:</text>
    <text x="92" y="258">• Cup clarity and sweetness</text>
    <text x="92" y="292">• Fines/sludge risk in V60, Kalita, Chemex</text>
    <text x="92" y="326">• Retention/static behavior</text>
    <text x="92" y="360">• Daily workflow effort (20g dose)</text>
